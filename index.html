<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Editing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.8/themes/odometer-theme-default.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="videoPlayer.css">
    <link rel="stylesheet" href="carousel.css">
</head>
<body>
    <nav>
        <a href="#presentation" class="logo">EZ Editing</a>
        <div class="nav-links">
            <a href="#pricing" class="btn-primary">Rejoindre EZ Editing</a>            
        </div>

    </nav>
    <main>
        <section id="hero">
            <div class="blur top-left" aria-hidden="true"></div>
            <div class="blur bottom-right" aria-hidden="true"></div>
            <div class="hero-inner">
                <div class="hero-content">
                    <h1>Atteins tes premiers <span class="money-goal"><span class="number-animate odometer primary" data-number="1000">0</span>€/mois</span> en <span class="number-animate odometer primary" data-number="90"></span> jours</h1>
                    <p id="heroTypewriter"></p>     
                    <div class="hero-ctas">
                        <a href="#pricing" class="btn-primary">Rejoindre EZ Editing</a>
                        <a href="#presentation" class="btn-hollow">En savoir plus</a>                
                    </div>                 
                </div>     
                <div class="hero-video">
                    <div id="vsl"></div>
                </div>                
            </div>
            <div class="hero-carousel">
                <div class="carousel " data-speed="40" data-direction="left" data-gap="96" data-fade-edges="false">
                    <div class="carousel-item">Motion Design</div>
                    <div class="carousel-item">Sound Design</div>
                    <div class="carousel-item">Productivité</div>
                    <div class="carousel-item">Prospection</div>
                    <div class="carousel-item">Vente</div>
                    <div class="carousel-item">Acquisition de clients</div>
                    <div class="carousel-item">Fidélisation client</div>
                </div>                
            </div>


            

            

            
        </section>
    </main>

    <script src="typewritter.js"></script>
    <script src="carousel.js"></script>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.8/odometer.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-minimal.js"></script>
    <script src="videoPlayer.js"></script>
</body>
</html>
